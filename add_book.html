<head>
    <title>Add Book - Admin</title>
    <link rel="stylesheet" href="css/dark black.css">
</head>
<body>
    <h2>Add New Book</h2>
    
    <form>
        <label>Book ID:</label><br>
        <input type="text" name="book_id" required><br><br>
        
        <label>Book Name:</label><br>
        <input type="text" name="title" required><br><br>
        
        <label>Author:</label><br>
        <input type="text" name="author" required><br><br>
        
        <label>Category:</label><br>
        <select name="category" required>
            <option value="">Select Category</option>
            <option value="Fiction">Fiction</option>
            <option value="Science">Science</option>
            <option value="History">History</option>
        </select><br><br>
        
        <label>Description:</label><br>
        <textarea name="description" rows="4" cols="50" placeholder="Enter book details here..." required></textarea><br><br>

        <button type="submit">Add Book</button>
        <button type="reset">Clear Form</button>
    </form>
    
    <br>
    <a href="view-books-admin.html">Back to Manage Books</a>
</body>

</html>
